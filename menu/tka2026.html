  script: {
    run: {
      _success: function () {},

        this._success = fn;
        return this;
      },

      withFailureHandler(fn) {
        this._failure = fn;
        return this;
      },

      pengumuman(pass,cari) {

          method: "POST",

            pass: pass,
            cari: cari
          }) // ⬅️ KUNCI
        })
        .then(res => res.text())          // ⬅️ sesuai GAS Anda
        .then(text => this._success(text))
        .catch(err => this._failure(err));
      }
	 
	  
	  
    }
  }
};
</script>
