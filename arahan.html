<!DOCTYPE html><html lang="id"><head>    
    <meta charset="UTF-8">    
    <meta name="viewport" content="width=device-width, initial-scale=1.0">    
    <meta name="referrer" content="strict-origin-when-cross-origin">    
    <title>Website Saya</title>
    <style>
        /* Kontainer Utama untuk membatasi ukuran luar */
        .wrapper-shorts {
            max-width: 360px; 
            margin: 0 auto; 
            position: relative; 
            overflow: hidden; 
            border-radius: 8px;
            height: 600px; /* Batasi tinggi kontainer luar agar bagian bawah iframe terpotong */
        }

        /* Kontainer khusus untuk memotong (crop) bagian atas dan bawah iframe */
        .crop-container {
            position: absolute;
            top: -40px;    /* Menggeser iframe ke atas sejauh 40px untuk menyembunyikan logo/judul YouTube */
            left: 0;
            width: 100%;
            height: 680px; /* Memberikan tinggi ekstra agar bagian bawahnya juga terpotong */
        }

        /* Mengatur iframe agar memenuhi kontainer crop */
        .crop-container iframe {
            width: 100%;
            height: 100%;
        }

        /* Lapisan cover klik buatan sendiri */
        #play-cover {
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            z-index: 10; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            background: rgba(0,0,0,0.1);
        }

        .play-btn {
            background: rgba(255, 255, 255, 0.8); 
            border-radius: 50%; 
            width: 60px; 
            height: 60px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

<div class="wrapper-shorts">        
    <div id="play-cover" onclick="putarVideo()">
        <div class="play-btn">
            <svg viewBox="0 0 24 24" width="30" height="30" fill="#333"><path d="M8 5v14l11-7z"/></svg>
        </div>
    </div>
    
    <div class="crop-container">
        <iframe         
            id="video-shorts"
            src="https://www.youtube.com/embed/4pEpsNgHfJ0?controls=0&rel=0&enablejsapi=1&mute=1" 
            title="Arahan Kepala Sekolah"         
            frameborder="0"         
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture">
        </iframe>
    </div>
</div>

<script>
function putarVideo() {    
    var iframe = document.getElementById("video-shorts");    
    // Mengaktifkan autoplay. Kebijakan browser mengharuskan autoplay dalam kondisi mute (suara mati) agar bisa langsung berputar.
    iframe.src += "&autoplay=1";        
    // Menghilangkan lapisan klik setelah video berputar    
    document.getElementById("play-cover").style.display = "none";
}
</script>

</body>
</html>
